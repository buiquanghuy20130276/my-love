<div style="display: flex; gap: 0; border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden;">

  <div style="width: 180px; background: var(--surface-1); padding: 16px 12px; flex-shrink: 0;">
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px; padding: 0 4px;">
      <i class="ti ti-heart" style="font-size: 18px; color: #D4537E;" aria-hidden="true"></i>
      <span style="font-size: 13px; font-weight: 500;">Admin</span>
    </div>
    <div style="display: flex; flex-direction: column; gap: 2px;">
      <div style="display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius);">
        <i class="ti ti-mail-heart" style="font-size: 16px; color: var(--text-secondary);" aria-hidden="true"></i>
        <span style="font-size: 13px; color: var(--text-secondary);">Thư xin lỗi</span>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius); background: #FBEAF0;">
        <i class="ti ti-timeline" style="font-size: 16px; color: #993556;" aria-hidden="true"></i>
        <span style="font-size: 13px; color: #72243E;">Dòng thời gian</span>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius);">
        <i class="ti ti-map-pin" style="font-size: 16px; color: var(--text-secondary);" aria-hidden="true"></i>
        <span style="font-size: 13px; color: var(--text-secondary);">Bản đồ tình yêu</span>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius);">
        <i class="ti ti-settings" style="font-size: 16px; color: var(--text-secondary);" aria-hidden="true"></i>
        <span style="font-size: 13px; color: var(--text-secondary);">Cài đặt</span>
      </div>
    </div>
  </div>

  <div style="flex: 1; background: var(--surface-2); padding: 20px 24px; min-width: 0;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h2 style="font-size: 16px; font-weight: 500; margin: 0;">Dòng thời gian</h2>
      <button style="background: #D4537E; color: white; border: none; font-size: 13px; padding: 7px 14px; border-radius: var(--radius); display: flex; align-items: center; gap: 6px;">
        <i class="ti ti-plus" style="font-size: 14px;" aria-hidden="true"></i>Thêm mốc mới
      </button>
    </div>
    <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 14px;">Kéo để sắp xếp lại thứ tự</p>

    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; align-items: center; gap: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; background: var(--surface-1);">
        <i class="ti ti-grip-vertical" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>
        <div style="width: 40px; height: 40px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i class="ti ti-photo" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>
        </div>
        <div style="flex: 1; min-width: 0;">
          <p style="font-size: 13px; font-weight: 500; margin: 0;">Lần đầu gặp nhau</p>
          <p style="font-size: 11px; color: var(--text-muted); margin: 1px 0 0;">14 thg 3, 2025 &middot; 3 ảnh</p>
        </div>
        <span style="font-size: 11px; background: #FBEAF0; color: #993556; padding: 2px 8px; border-radius: 999px;">Đặc biệt</span>
        <i class="ti ti-edit" style="font-size: 15px; color: var(--text-muted);" aria-hidden="true"></i>
        <i class="ti ti-trash" style="font-size: 15px; color: var(--text-muted);" aria-hidden="true"></i>
      </div>

      <div style="display: flex; align-items: center; gap: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; background: var(--surface-1);">
        <i class="ti ti-grip-vertical" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>
        <div style="width: 40px; height: 40px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i class="ti ti-photo" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>
        </div>
        <div style="flex: 1; min-width: 0;">
          <p style="font-size: 13px; font-weight: 500; margin: 0;">Buổi hẹn đầu tiên</p>
          <p style="font-size: 11px; color: var(--text-muted); margin: 1px 0 0;">2 thg 4, 2025 &middot; 2 ảnh</p>
        </div>
        <i class="ti ti-edit" style="font-size: 15px; color: var(--text-muted);" aria-hidden="true"></i>
        <i class="ti ti-trash" style="font-size: 15px; color: var(--text-muted);" aria-hidden="true"></i>
      </div>

      <div style="display: flex; align-items: center; gap: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; background: var(--surface-1);">
        <i class="ti ti-grip-vertical" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>
        <div style="width: 40px; height: 40px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i class="ti ti-photo" style="font-size: 16px; color: var(--text-muted);" aria-hidden="true"></i>
        </div>
        <div style="flex: 1; min-width: 0;">
          <p style="font-size: 13px; font-weight: 500; margin: 0;">Chuyến đi Đà Lạt</p>
          <p style="font-size: 11px; color: var(--text-muted); margin: 1px 0 0;">20 thg 6, 2025 &middot; 5 ảnh</p>
        </div>
        <i class="ti ti-edit" style="font-size: 15px; color: var(--text-muted);" aria-hidden="true"></i>
        <i class="ti ti-trash" style="font-size: 15px; color: var(--text-muted);" aria-hidden="true"></i>
      </div>
    </div>
  </div>
</div>
