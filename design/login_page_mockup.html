<div style="background: var(--surface-1); border-radius: 12px; padding: 24px 16px; display: flex; justify-content: center;">
<div style="width: 320px; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 20px; padding: 32px 24px; display: flex; flex-direction: column; align-items: center;">
  <div style="width: 56px; height: 56px; border-radius: 50%; background: var(--pink-50, #FBEAF0); display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
    <i class="ti ti-heart" style="font-size: 26px; color: #D4537E;" aria-hidden="true"></i>
  </div>
  <h1 style="font-family: var(--font-voice); font-size: 22px; font-weight: 500; margin: 0 0 4px; text-align: center;">Câu chuyện của chúng ta</h1>
  <p style="font-size: 13px; color: var(--text-secondary); margin: 0 0 28px; text-align: center;">Đăng nhập để xem những kỷ niệm riêng của hai ta</p>

  <div style="width: 100%; margin-bottom: 14px;">

    <input type="text" placeholder="ten@email.com" style="width: 100%;" />
  </div>
  <div style="width: 100%; margin-bottom: 22px;">
    <label style="font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px;">Mật khẩu</label>
    <input type="password" placeholder="••••••••" style="width: 100%;" />
  </div>

  <button style="width: 100%; background: #D4537E; border: none; color: white; font-size: 14px; font-weight: 500; padding: 10px; border-radius: var(--radius); margin-bottom: 12px;">Đăng nhập</button>
